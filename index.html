<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXAMINATION</title>

```
<!-- FIXED: use correct path -->
<script src="SCRIPT/aframe.min.js"></script>
<script src="SCRIPT/ada-water.js"></script>
```

</head>

<body>
    <a-scene>

```
    <a-assets>
        <!-- TEXTURES -->
        <img src="textures/floor-1024.jpg" id="floor">
        <img src="textures/clear-sunny-sky.jpg" id="sky">

        <!-- MODELS -->
        <a-asset-item id="car" src="bmw/scene.gltf"></a-asset-item>
        <a-asset-item id="car2" src="Mclareen/scene.gltf"></a-asset-item>
        <a-asset-item id="car3" src="lexus/scene.gltf"></a-asset-item>

        <!-- FIXED: removed space + brackets -->
        <a-asset-item id="villa" src="model/scene.gltf"></a-asset-item>
    </a-assets>

    <!-- SKY -->
    <a-sky src="#sky"></a-sky>

    <!-- GROUND -->
    <a-plane 
        src="#floor" 
        repeat="500 500" 
        scale="500 500 500" 
        rotation="-90 0 0">
    </a-plane>

    <!-- CAMERA -->
    <a-entity position="0 2 25">
        <a-camera></a-camera>
    </a-entity>

    <!-- HOUSE -->
    <a-entity gltf-model="#villa" position="0 0.08 0"></a-entity>

    <!-- CARS -->
    <a-entity gltf-model="#car" position="-4 0.05 -15" scale="100 100 100" rotation="0 180 0"></a-entity>

    <!-- FIXED: removed 's' -->
    <a-entity gltf-model="#car2" position="-8 0.05 -15" scale="100 100 100" rotation="0 -180 0"></a-entity>

    <a-entity gltf-model="#car3" position="6 0.05 -14" scale="100 100 100" rotation="0 -180 0"></a-entity>

    <!-- WATER -->
    <a-water position="1 0.1 -36.5" color="blue" scale="0.6 0.5 1"></a-water>

</a-scene>
```

</body>
</html>
